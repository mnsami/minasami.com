<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": "WebSite",
      "@id": "{{ site.url }}/#website",
      "name": "{{ site.title }}",
      "url": "{{ site.url }}",
      "description": "{{ site.description | strip_html | strip_newlines | escape }}"
    },
    {
      "@type": "Person",
      "@id": "{{ site.url }}/#person",
      "name": "{{ site.author.name }}",
      "url": "{{ site.url }}/about/",
      "image": "{{ site.logo | absolute_url }}",
      "jobTitle": "Senior Software Engineer",
      "description": "{{ site.description | strip_html | strip_newlines | escape }}",
      "knowsAbout": [
        "PHP Development",
        "Symfony Framework",
        "Laravel Framework",
        "Node.js",
        "Nest.js",
        "AWS Cloud Computing",
        "DevOps",
        "CI/CD",
        "Docker",
        "RESTful API Design",
        "Backend Architecture",
        "MySQL",
        "PostgreSQL",
        "Database Optimization",
        "Software Engineering Mentorship",
        "Agile Scrum Methodology"
      ],
      "sameAs": [
        "https://twitter.com/MinaNabilSami",
        "https://www.linkedin.com/in/mnsami",
        "https://github.com/mnsami",
        "https://instagram.com/minansami"
      ],
      "worksFor": {
        "@type": "Organization",
        "name": "Independent Consultant"
      }
    },
    {
      "@type": "Organization",
      "@id": "{{ site.url }}/#organization",
      "name": "Mina Nabil Sami",
      "url": "{{ site.url }}",
      "logo": {
        "@type": "ImageObject",
        "url": "{{ site.logo | absolute_url }}"
      },
      "description": "{{ site.description | strip_html | strip_newlines | escape }}",
      "founder": { "@id": "{{ site.url }}/#person" },
      "sameAs": [
        "https://twitter.com/MinaNabilSami",
        "https://www.linkedin.com/in/mnsami",
        "https://github.com/mnsami",
        "https://instagram.com/minansami"
      ]
    }
  ]
}
</script>
