{% if page.layout == "post" or page.layout == "page" %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": "{{ site.url }}/"
    }
    {% if page.layout == "post" %}
      {% if page.categories.size > 0 %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.categories[0] | replace: '-', ' ' | capitalize }}",
      "item": "{{ site.url }}/categories/{{ page.categories[0] }}/"
    },
    {
      "@type": "ListItem",
      "position": 3,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
      {% else %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
      {% endif %}
    {% elsif page.layout == "page" %},
    {
      "@type": "ListItem",
      "position": 2,
      "name": "{{ page.title | escape }}",
      "item": "{{ page.url | absolute_url }}"
    }
    {% endif %}
  ]
}
</script>
{% endif %}
